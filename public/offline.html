<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>We Better - Offline</title>
  <style>
    :root {
      --accent-color: #7e22ce;
      --secondary-color: #4c1d95;
      --text-color: #1f2937;
      --background-color: #f9fafb;
      --border-radius: 12px;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen,
        Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      background: var(--background-color);
      color: var(--text-color);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    
    .container {
      max-width: 600px;
      padding: 40px;
      background: white;
      border-radius: var(--border-radius);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }
    
    h1 {
      color: var(--accent-color);
      margin-bottom: 16px;
      font-size: 2rem;
    }
    
    p {
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    
    .icon {
      font-size: 60px;
      margin-bottom: 20px;
    }
    
    .button {
      display: inline-block;
      background: var(--accent-color);
      color: white;
      padding: 12px 24px;
      border: none;
      border-radius: var(--border-radius);
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s ease;
    }
    
    .button:hover {
      background: var(--secondary-color);
      transform: translateY(-2px);
    }
    
    @media (prefers-color-scheme: dark) {
      :root {
        --background-color: #111827;
        --text-color: #f9fafb;
      }
      
      .container {
        background: #1f2937;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📶</div>
    <h1>You're offline</h1>
    <p>
      The page you requested is not available offline. Please check your 
      internet connection and try again.
    </p>
    <p>
      You can still access any previously viewed content from your 
      cached data.
    </p>
    <button class="button" onclick="window.location.href='/'">
      Go to Homepage
    </button>
  </div>
  
  <script>
    // Check if we come back online
    window.addEventListener('online', () => {
      // Reload the page when connection is restored
      window.location.reload();
    });
    
    // Check if the page is in the cache
    if ('caches' in window) {
      caches.match(window.location.href)
        .then(response => {
          if (response) {
            // If the page is cached, load it
            return response.text().then(text => {
              document.documentElement.innerHTML = text;
            });
          }
        })
        .catch(err => {
          console.error('Cache match error:', err);
        });
    }
  </script>
</body>
</html>
